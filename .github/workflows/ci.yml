name: ci
on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
permissions:
  contents: read
env:
  # Path to where test results will be saved.
  TEST_RESULTS: /tmp/test-results
jobs:
  lint:
    needs: [detect-changes]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: stable
        check-latest: true

    - name: Checkout Repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Module cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      env:
        cache-name: go-mod-cache
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('**/go.sum') }}

    - name: Tools cache
      id: cache-tools
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      env:
        cache-name: go-tools-cache
      with:
        path: .tools
        key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('./internal/tools/**') }}

    - name: Install tools
      if: steps.cache-tools.outputs.cache-hit != 'true'
      run: make tools

    - name: Add .exe to tools on Windows
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        for file in ./.tools/*; do
          cp "$file" "${file}.exe"
        done

    - name: Run linters
      shell: bash
      run: |
        AFFECTED_MODULES="${{ needs.detect-changes.outputs.affected_modules }}"
        make multimod-verify license-check lint ALL_GO_MOD_DIRS="$AFFECTED_MODULES"

    - name: Build
      shell: bash
      run: |
        AFFECTED_MODULES="${{ needs.detect-changes.outputs.affected_modules }}"
        make build ALL_GO_MOD_DIRS="$AFFECTED_MODULES"

    - name: Check clean repository
      run: make check-clean-work-tree

  test-race:
    needs: [detect-changes]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: oldstable
        check-latest: true

    - name: Checkout Repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Setup Environment
      run: |
        echo "GOPATH=$(go env GOPATH)" >> $GITHUB_ENV
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Module cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      env:
        cache-name: go-mod-cache
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('**/go.sum') }}

    - name: Run tests with race detector
      shell: bash
      run: |
        AFFECTED_MODULES="${{ needs.detect-changes.outputs.affected_modules }}"
        make test-race ALL_GO_MOD_DIRS="$AFFECTED_MODULES"

  test-coverage:
    runs-on: ubuntu-latest
    steps:
    - name: Install Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
      with:
        go-version: oldstable
        check-latest: true

    - name: Checkout Repo
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Setup Environment
      run: |
        echo "GOPATH=$(go env GOPATH)" >> $GITHUB_ENV
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Module cache
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      env:
        cache-name: go-mod-cache
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('**/go.sum') }}

    - name: Run coverage tests
      run: |
        make test-coverage
        mkdir $TEST_RESULTS
        cp coverage.out $TEST_RESULTS
        cp coverage.txt $TEST_RESULTS
        cp coverage.html $TEST_RESULTS

    - name: Upload coverage report
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        file: ./coverage.txt
        fail_ci_if_error: true
        verbose: true
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Store coverage test output
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
          name: opentelemetry-go-test-output
          path: ${{ env.TEST_RESULTS }}
  check-lint:
    runs-on: ubuntu-latest
    needs: [lint]
    if: always()
    steps:
      - name: Test if lint passed
        run: |
          echo ${{ needs.lint.result }}
          test ${{ needs.lint.result }} == "success"
  check-test-race:
    runs-on: ubuntu-latest
    needs: [test-race]
    if: always()
    steps:
      - name: Test if test-race passed
        run: |
          echo ${{ needs.test-race.result }}
          test ${{ needs.test-race.result }} == "success"

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      affected_modules: ${{ steps.set-affected-modules.outputs.affected_modules }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: set affected modules
        id: set-affected-modules
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          echo "BASE=$BASE"
          AFFECTED_FILES=$(git diff --name-only "$BASE" HEAD || true)
          echo "AFFECTED_FILES=$AFFECTED_FILES"
          chmod +x ./get_affected_pkgs.sh
          AFFECTED_MODULES=$(./get_affected_pkgs.sh $AFFECTED_FILES)

          # Exclude tools and checkapi internal modules
          TOOLS_MOD_DIR="./internal/tools"
          CHECKAPI_INTERNAL_MOD_DIRS=$(find ./checkapi/internal -type f -name 'go.mod' -exec dirname {} \;)
          
          for exclude in $TOOLS_MOD_DIR $CHECKAPI_INTERNAL_MOD_DIRS; do
            AFFECTED_MODULES=$(echo "$AFFECTED_MODULES" | tr ' ' '\n' | grep -v "^${exclude#./}" | tr '\n' ' ')
          done

          AFFECTED_MODULES=$(echo "$AFFECTED_MODULES" | xargs)
          echo "affected_modules=$AFFECTED_MODULES" >> $GITHUB_OUTPUT
